name: Flutter CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0' # or your Flutter version
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
